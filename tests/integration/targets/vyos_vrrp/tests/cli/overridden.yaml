---
- debug:
    msg: START vyos_vrrp overridden integration tests on connection={{ ansible_connection }}

- include_tasks: _remove_config.yaml

- include_tasks: _populate_config.yaml

- block:
    - name: Override the existing configuration with the provided running configuration
      register: result
      vyos.vyos.vyos_vrrp: &id001
        config: "{{ overridden.config }}"
        state: overridden

    - vyos.vyos.vyos_facts:
        gather_network_resources: vrrp

    # - name: Verify that the configuration was correctly overridden
    #   assert:
