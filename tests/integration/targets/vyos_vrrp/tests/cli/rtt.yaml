---
- debug:
    msg: START vyos_vrrp rtt integration tests on connection={{ ansible_connection }}

- include_tasks: _remove_config.yaml

- block:
    - name: RTT Merge the provided configuration with the existing running configuration
      register: baseconfig
      vyos.vyos.vyos_vrrp:
        config: "{{ merged.config }}"
        state: merged

    - vyos.vyos.vyos_facts:
        gather_network_resources: vrrp

    - assert:
        that:
          - baseconfig.changed == true
          - baseconfig.commands|symmetric_difference(rtt.commands) == []
          - baseconfig.after|symmetric_difference(ansible_facts['network_resources']['vrrp']) == []

    - name: RTT Merge the existing configuration with the provided running configuration
      register: result
      vyos.vyos.vyos_vrrp:
        config: "{{ rtt.config }}"

    - name: RTT Revert back to base config using facts round trip
      register: revert
      vyos.vyos.vyos_vrrp:
        config: "{{ ansible_facts['network_resources']['vrrp'] }}"
        state: overridden

    - name: RTT Assert that config was reverted
      assert:
        that: baseconfig.after == revert.after

  always:
    - include_tasks: _remove_config.yaml
