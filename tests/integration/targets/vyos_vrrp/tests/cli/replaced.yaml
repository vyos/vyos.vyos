---
- debug:
    msg: START vyos_vrrp replaced integration tests on connection={{ ansible_connection }}

- include_tasks: _remove_config.yaml

- include_tasks: _populate_config.yaml

- block:
    - name: Replace  the provided configuration with the existing running configuration
      register: result
      vyos.vyos.vyos_vrrp: &id001
        config: "{{ merged.config }}"
        state: replaced

    - vyos.vyos.vyos_facts:
        gather_network_resources: vrrp

    - assert:
        that:
          - result.changed == true
          - result.after == ansible_facts['network_resources']['vrrp']
    #       - result.after == replaced.after

    # - name: Replace the provided configuration with the existing running configuration (IDEMPOTENT)
    #   register: result
    #   vyos.vyos.vyos_vrrp: *id001

    # - name: Assert that the previous task was idempotent
    #   assert:
    #     that:
    #       - result['changed'] == false

  always:
    - include_tasks: _remove_config.yaml
