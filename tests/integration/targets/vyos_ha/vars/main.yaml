    - set high-availability vrrp group g1 priority 100
    - set high-availability vrrp group g1 vrid 20
    - set high-availability vrrp group g2 address 4.4.4.4
    - set high-availability vrrp group g2 address 6.6.6.6 interface eth3
    - set high-availability vrrp snmp
    - set high-availability vrrp sync-group sg1 health-check failure-count 5
  config:
    disable: false
    virtual_servers:
      - name: s1
        address: 10.10.10.5
        fwmark: 10
        algorithm: least-connection
        real_server:
          - address: 10.10.50.2
            port: 8443
      - name: s2
        address: 10.10.10.2
        persistence_timeout: 36
        port: 443
        protocol: tcp
        real_server:
          - address: 10.10.50.3
            port: 8443
      - name: s3
        address: 10.10.10.3
        port: 80
        protocol: udp
        real_server:
          - address: 10.10.50.4
            port: 8443
    vrrp:
      snmp: disabled
      global_parameters:
        startup_delay: 36
        garp:
          master_repeat: 6
      groups:
        - name: "g1"
          peer_address: 192.168.1.3
          address: "1.1.1.1"
          priority: 100
          disable: true
          no_preempt: false
          interface: eth2
          vrid: 20
        - name: "g2"
          address:
            - "2.2.2.2"
          interface: eth1
          vrid: 11
      sync_groups:
        - name: "sg1"
          health_check:
            failure_count: 10
  after:
    disable: true
    virtual_servers:
      - address: "10.10.10.5"
        algorithm: "round-robin"
        name: "s1"
        real_server:
          - address: "10.10.50.2"
            port: 8443
      - address: "10.10.10.2"
