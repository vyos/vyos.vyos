---
merged:
  before: {}
  commands:
    - set system syslog console facility all
    - set system syslog local facility cron level debug
  after:
    console:
      facilities:
        - facility: all
    global_params:
      facilities:
        - facility: cron
          severity: debug

overridden:
  commands:
    - delete system syslog local facility cron
    - delete system syslog local facility local7
    - delete system syslog remote 172.16.2.12 protocol udp
    - delete system syslog remote 172.16.2.15 protocol udp
    - delete system syslog remote 172.16.2.12
    - delete system syslog remote 172.16.2.15

  after:
    console:
      facilities:
        - facility: all
        - facility: local7
          severity: err
        - facility: news
          severity: debug
    files:
      - path: Myfile

populate_logging_global_hosts:
  - hostname: 172.16.2.15
    facilities:
      - facility: all
        severity: all
      - facility: all
    protocol: udp
  - hostname: 172.16.2.12
    facilities:
      - facility: all
    protocol: udp

rendered:
  commands:
    - set system syslog console facility all
    - set system syslog remote 172.16.2.15 facility all level all
    - set system syslog local facility cron level debug

deleted:
  commands:
    - delete system syslog
  after: {}

parsed:
  after:
    console:
      facilities:
        - facility: all
        - facility: news
          severity: debug
    global_params:
      marker_interval: 111
      preserve_fqdn: true
      facilities:
        - facility: cron
          severity: debug
        - facility: local7
          severity: debug
    hosts:
      - hostname: 10.0.2.12
        facilities:
          - facility: all
            severity: info
      - hostname: 10.0.2.15
        port: 514
        protocol: udp
        facilities:
          - facility: all
            severity: all

populate_config:
  console:
    facilities:
      - facility: all
      - facility: local7
        severity: err
      - facility: news
        severity: debug
  files:
    - path: def
      archive:
        file_num: 2
      facilities:
        - facility: local6
          severity: emerg
        - facility: local7
          severity: emerg
  hosts: "{{ populate_logging_global_hosts }}"
  users:
    - username: vyos
      facilities:
        - facility: local7
          severity: debug
        - facility: local6
          severity: alert
    - username: paul
      facilities:
        - facility: local7
          severity: err
  global_params:
    facilities:
      - facility: cron
        severity: debug
      - facility: local7
        severity: debug

parsed_config_file: "_parsed_15.cfg"
