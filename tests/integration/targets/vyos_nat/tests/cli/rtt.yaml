---
- debug:
    msg: START vyos_nat round trip integration tests on connection={{ ansible_connection }}

- include_tasks: _populate.yaml

- block:
    - name: Apply additional NAT rule to establish base config
      register: baseconfig
      vyos.vyos.vyos_nat:
        config:
          nat:
            destination:
              rule:
                - id: 100
                  description: Web server NAT
                  protocol: tcp
                  log: true
                  inbound_interface:
                    name: eth2
                  destination:
                    address: 198.51.100.10
                    port: "80"
                  translation:
                    address: 192.168.1.10
                    port: "8080"
                - id: 101
                  description: RTT base rule
                  protocol: tcp
                  destination:
                    address: 198.51.100.11
                    port: "443"
                  translation:
                    address: 192.168.1.11
                    port: "8443"
        state: merged

    - vyos.vyos.vyos_facts:
        gather_network_resources: nat

    - name: Modify rule 101 description
      register: result
      vyos.vyos.vyos_nat:
        config:
          nat:
            destination:
              rule:
                - id: 101
                  description: RTT modified rule
                  protocol: tcp
                  destination:
                    address: 198.51.100.11
                    port: "443"
                  translation:
                    address: 192.168.1.11
                    port: "8443"
        state: merged

    - name: Revert back to base config using facts round trip
      register: revert
      vyos.vyos.vyos_nat:
        config: "{{ ansible_facts['network_resources']['nat'] }}"
        state: overridden

    - name: Assert that config was reverted
      assert:
        that: baseconfig.after == revert.after

  always:
    - include_tasks: _remove_config.yaml
