[testenv:sanity-*]
description = Run ansible-test sanity (generic)
type = VirtualEnvRunner
runner = virtualenv
base = testenv
skip_install = True
package = skip

# Generic env directories
envdir = {toxworkdir}/{envname}
set_env =
  ANSIBLE_COLLECTIONS_PATH={envtmpdir}/collections
  PIP_DISABLE_PIP_VERSION_CHECK=1
  PYTHONIOENCODING=utf-8

pass_env =
  CC
  CFLAGS
  CPPFLAGS
  HOME
  LANG
  LANGUAGE
  PIP_*
  http_proxy
  https_proxy
  no_proxy

allowlist_externals =
  bash
  rsync
  mkdir
  cd
  git

commands_pre =
  mkdir -p {envtmpdir}/collection_build
  rsync -r --cvs-exclude --filter=":- .gitignore" . {envtmpdir}/collection_build
  bash -c 'cd {envtmpdir}/collection_build && ansible-galaxy collection build && ansible-galaxy collection install *.tar.gz -p {envtmpdir}/collections'
  bash -c 'cd {envtmpdir}/collections/ansible_collections/*/* && git config --global init.defaultBranch main && git init .'

commands =
  bash -c 'cd {envtmpdir}/collections/ansible_collections/*/* && ansible-test sanity --local --requirements'

deps =
  https://github.com/ansible/ansible/archive/devel.tar.gz
