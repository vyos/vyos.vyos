[tox]
skipsdist = true

[testenv]
deps =
    ansible-core
    ansible-dev-environment

allowlist_externals =
    mkdir
    ln

commands_pre =
    mkdir -p {envtmpdir}/ansible_collections/vyos
    ln -s {toxinidir} {envtmpdir}/ansible_collections/vyos/vyos

change_dir = {envtmpdir}/ansible_collections/vyos/vyos

commands =
    ansible-test sanity
