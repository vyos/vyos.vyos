[tox]
skipsdist = true

[testenv]
deps =
    ansible-core
    ansible-dev-environment
    pytest
    pytest-ansible

allowlist_externals =
    mkdir
    ln

# Prepare temp ansible_collections path
commands_pre =
    mkdir -p {envtmpdir}/ansible_collections/vyos
    ln -s {toxinidir} {envtmpdir}/ansible_collections/vyos/vyos

# Run tests from your repo
commands =
    # run ansible-test sanity from repo root (avoids ADE)
    bash -c "cd {toxinidir} && ansible-test sanity || echo 'Sanity skipped or empty'"

    # run unit tests with pytest
    bash -c "cd {toxinidir} && python -m pytest --ansible-unit-inject-only tests/unit"
